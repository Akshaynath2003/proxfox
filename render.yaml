services:
  # ── FastAPI Backend (Web Service) ──────────────────────────────────────────────
  - type: web
    name: proxfox-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn fastapi_app:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false        # Enter in Render dashboard
      - key: JWT_SECRET
        sync: false        # Enter in Render dashboard
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # ── React Frontend (Static Site) ───────────────────────────────────────────────
  - type: web
    name: proxfox-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: proxfox-backend
          type: web
          property: host     # auto-resolves to https://proxfox-backend.onrender.com
