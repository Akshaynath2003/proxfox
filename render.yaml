services:
  # ── Django Backend (Web Service) ─────────────────────────────────────────────
  - type: web
    name: proxfox-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 wsgi:application
    envVars:
      - key: MONGO_URI
        sync: false        # Enter in Render dashboard
      - key: JWT_SECRET
        sync: false        # Enter in Render dashboard
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

  # ── React Frontend (Static Site) ─────────────────────────────────────────────
  - type: web
    name: proxfox-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false        # Enter your backend Render URL here after deploying backend
